services:
    installer:
        build:
            context: .
            dockerfile: tests/docker/Dockerfile
        volumes:
            - ./:/home/tester/workspace:cached
        tty: false
        stdin_open: false
        environment:
            - NO_CHSH=1
            - DEBIAN_FRONTEND=noninteractive
            - APT_LISTCHANGES_FRONTEND=none
            - TERM=dumb
            - ATUIN_NO_PROMPT=1
        user: root
        command: ["bash", "-lc", "./install.sh --yes || true"]

    cli-external:
        build:
            context: .
            dockerfile: tests/docker/Dockerfile
        volumes:
            - ./:/home/tester/workspace:cached
        tty: false
        stdin_open: false
        environment:
            - NO_CHSH=1
            - DEBIAN_FRONTEND=noninteractive
            - APT_LISTCHANGES_FRONTEND=none
            - TERM=dumb
            - ATUIN_NO_PROMPT=1
        user: root
        command:
            [
                "bash",
                "-lc",
                "./install.sh --yes || true; echo '--- debug: PATH and binary locations ---'; echo 'command -v good-trip:'; command -v good-trip || true; echo 'ls /root/.local/bin:'; ls -la /root/.local/bin 2>/dev/null || true; echo 'ls /home/tester/.local/bin:'; ls -la /home/tester/.local/bin 2>/dev/null || true; echo 'ls /root/bin:'; ls -la /root/bin 2>/dev/null || true; echo 'ls /home/tester/bin:'; ls -la /home/tester/bin 2>/dev/null || true; echo '--- run version/status ---'; ( /root/.local/bin/good-trip --version || /home/tester/.local/bin/good-trip --version || /root/bin/good-trip --version || /home/tester/bin/good-trip --version || /home/tester/workspace/bin/good-trip --version ) && ( /root/.local/bin/good-trip status || /home/tester/.local/bin/good-trip status || /root/bin/good-trip status || /home/tester/bin/good-trip status || /home/tester/workspace/bin/good-trip status ) || ( echo 'CLI check failed'; exit 127 )",
            ]
