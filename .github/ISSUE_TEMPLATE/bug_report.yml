name: Bug Report
description: Something isn't working as expected
labels: [bug]
body:
    - type: markdown
      attributes:
          value: |
              Before opening, check the [CHANGELOG](https://github.com/PepeuFBV/good-trip/blob/main/CHANGELOG.md)
              and [open issues](https://github.com/PepeuFBV/good-trip/issues) to avoid duplicates.

    - type: input
      id: version
      attributes:
          label: good-trip version
          description: Run `good-trip version`
          placeholder: "1.12.4"
      validations:
          required: true

    - type: dropdown
      id: os
      attributes:
          label: Operating system
          options:
              - Ubuntu
              - Debian
              - Arch Linux
              - macOS
              - Other Linux
      validations:
          required: true

    - type: textarea
      id: reproduce
      attributes:
          label: Steps to reproduce
          placeholder: |
              1. Run `good-trip ...`
              2. See error ...
      validations:
          required: true

    - type: textarea
      id: expected
      attributes:
          label: Expected behaviour
      validations:
          required: true

    - type: textarea
      id: actual
      attributes:
          label: Actual behaviour
          description: Include relevant terminal output or error messages
      validations:
          required: true
