name: Software Installation and Testing

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
    workflow_run:
        workflows:
            - "CI"
        types:
            - completed
    workflow_dispatch:

jobs:
    install-and-test:
        name: Install and Test
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  fetch-depth: 0
                  persist-credentials: true

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "lts/*"

            - name: Install dependencies
              run: npm install

            - name: Run tests
              run: npm test
