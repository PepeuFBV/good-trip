name: Software Installation and Testing

on:
    push:
        branches-ignore:
            - main
    pull_request:
        branches:
            - main
    workflow_dispatch:

jobs:
    install-and-test:
        name: Install and Test
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "lts/*"

            - name: Install dependencies
              run: npm install

            - name: Run tests
              run: npm test
