name: CI

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
    push:
        branches-ignore:
            - main
    pull_request:
        branches:
            - main

# Cancel in-progress runs for the same ref to avoid duplicate job sets
# when a push and a pull_request event both fire for the same branch.
concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    lint-commits:
        name: Lint Commit Messages
        runs-on: ubuntu-latest
        if: github.event_name == 'pull_request'

        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "lts/*"

            - name: Install commitlint
              run: |
                  npm install -g \
                    @commitlint/cli \
                    @commitlint/config-conventional

            - name: Validate PR commits
              run: |
                  npx commitlint \
                    --from ${{ github.event.pull_request.base.sha }} \
                    --to ${{ github.event.pull_request.head.sha }} \
                    --verbose

    lint-shell:
        name: Lint Shell Scripts
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Install shellcheck
              run: sudo apt-get install -y shellcheck

            - name: Run shellcheck on all shell scripts
              run: |
                  # Exclude node_modules to avoid linting third-party code
                  find . -name "*.sh" -not -path "./.git/*" -not -path "./node_modules/*" | \
                    xargs shellcheck --severity=warning

            - name: Check bin/good-trip
              run: shellcheck --severity=warning bin/good-trip

    validate-structure:
        name: Validate Structure
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Check required files exist
              run: |
                  required=(
                    "version.txt"
                    "install.sh"
                    "update.sh"
                    "bin/good-trip"
                    "scripts/symlinks.sh"
                    "scripts/update.sh"
                    "config/zsh/.zshrc"
                    "config/git/config"
                    "config/aliases/docker.aliases"
                    "config/aliases/node.aliases"
                    ".releaserc.json"
                  )
                  failed=0
                  for f in "${required[@]}"; do
                    if [[ ! -f "$f" ]]; then
                      echo "MISSING: $f"
                      failed=1
                    else
                      echo "OK: $f"
                    fi
                  done
                  exit $failed

            - name: Check scripts are executable (or will be made so)
              run: |
                  echo "Checking shell script validity (bash -n)..."
                  while IFS= read -r -d '' script; do
                    echo "Checking: $script"
                    bash -n "$script" || { echo "SYNTAX ERROR in $script"; exit 1; }
                  done < <(find . -name "*.sh" -not -path "./.git/*" -print0)
                  bash -n bin/good-trip

    prettier:
        name: Prettier Check
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "18"

            - name: Install Prettier
              run: npm install --no-save prettier

            - name: Run Prettier check
              run: npx prettier --check .

    unit-tests:
        name: Unit Tests (bats-core)
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Install git (required by bats setup)
              run: sudo apt-get install -y git

            - name: Run unit tests
              run: bash tests/run_unit_tests.sh

    smoke-test:
        name: Script Smoke Test (Linux)
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Smoke-test install.sh syntax and --help
              # bash -n validates syntax; --help must exit 0 without installing anything
              run: npm run test:ci

            - name: Smoke-test CLI --help
              run: |
                  export GOOD_TRIP_DIR="$PWD"
                  bin/good-trip --help >/dev/null

    macos-validate:
        name: macOS Validation
        runs-on: macos-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Install git (required by bats setup on macOS)
              run: brew install git

            - name: Print macOS and bash versions
              run: |
                  sw_vers
                  bash --version | head -1

            - name: Syntax-check all shell scripts (macOS bash)
              # Catches any constructs that differ between GNU bash on Linux
              # and the bash version shipped by GitHub's macOS runner
              run: |
                  find . -name "*.sh" \
                    -not -path "./.git/*" \
                    -not -path "./node_modules/*" | \
                    while IFS= read -r f; do
                      bash -n "$f" || { echo "SYNTAX ERROR: $f"; exit 1; }
                    done
                  bash -n bin/good-trip

            - name: Smoke-test install.sh --help on macOS
              run: bash -n install.sh && ./install.sh --help >/dev/null

            - name: Smoke-test CLI --help on macOS
              run: |
                  export GOOD_TRIP_DIR="$PWD"
                  bin/good-trip --help >/dev/null

            - name: Run unit tests on macOS (bats-core)
              # Validates behavioral correctness under macOS bash and BSD userland
              run: bash tests/run_unit_tests.sh
